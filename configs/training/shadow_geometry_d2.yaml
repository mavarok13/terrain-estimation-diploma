seed: 42
dataset:
  root: data/generated/shadow_geometry_d2
  train_manifest: data/generated/shadow_geometry_d2/train.csv
  val_manifest: data/generated/shadow_geometry_d2/val.csv
  image_size: 256
  use_pair: true
  use_metadata: true
  metadata_keys:
    - sun_azimuth_deg
    - sun_elevation_deg
    - sun_azimuth_alt_deg
    - sun_elevation_alt_deg
  shadow_augmentation: false
training:
  input_mode: grayscale_pair_shadowmask_sun
  output_dir: outputs/shadow_geometry_d2
  epochs: 44
  batch_size: 8
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0001
  device: auto
  save_visualizations: 4
model:
  base_channels: 32
loss:
  l1_weight: 1.0
  grad_weight: 0.5
  ssim_weight: 0.1
