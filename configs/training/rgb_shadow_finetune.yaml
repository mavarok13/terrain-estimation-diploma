seed: 42
dataset:
  root: data/generated/simple_geometry_d3
  train_manifest: data/generated/simple_geometry_d3/train.csv
  val_manifest: data/generated/simple_geometry_d3/val.csv
  image_size: 256
  use_pair: true
  use_metadata: true
  metadata_keys:
    - sun_azimuth_deg
    - sun_elevation_deg
    - sun_azimuth_alt_deg
    - sun_elevation_alt_deg
  shadow_augmentation: false
training:
  input_mode: rgb_pair_shadowmask_sun
  pretrained_checkpoint: outputs/simple_geometry_d3/checkpoints/last.pt
  output_dir: outputs/rgb_shadow_finetune
  epochs: 25
  batch_size: 4
  num_workers: 4
  lr: 0.00003
  weight_decay: 0.0001
  device: auto
  save_visualizations: 4
  freeze_encoder_epochs: 0
model:
  base_channels: 32
loss:
  l1_weight: 1.0
  grad_weight: 0.5
  ssim_weight: 0.1
