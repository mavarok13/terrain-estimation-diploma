seed: 42
dataset:
  root: data/generated/simple_geometry_d3_nr
  train_manifest: data/generated/simple_geometry_d3_nr/train.csv
  val_manifest: data/generated/simple_geometry_d3_nr/val.csv
  image_size: 256
  # Keep these true so the teacher can receive paired/shadow/sun inputs.
  # The student still receives only RGB because training.input_mode is rgb.
  use_pair: true
  use_metadata: true
  metadata_keys:
    - sun_azimuth_deg
    - sun_elevation_deg
    - sun_azimuth_alt_deg
    - sun_elevation_alt_deg
  shadow_augmentation: false
training:
  input_mode: rgb
  output_dir: outputs/rgb_student_distill
  epochs: 25
  batch_size: 4
  num_workers: 4
  lr: 0.00003
  weight_decay: 0.0001
  device: auto
  save_visualizations: 4
  freeze_encoder_epochs: 0
model:
  base_channels: 32
loss:
  l1_weight: 1.0
  grad_weight: 0.5
  ssim_weight: 0.1
distillation:
  enabled: true
  teacher_checkpoint: stage4-best/best.pt
  gt_weight: 1.0
  distill_weight: 0.3
  encoder_transfer: true
  encoder_only: true
